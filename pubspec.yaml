name: caffe_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  flutter_bloc: ^8.1.6
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  cached_network_image: ^3.4.1
  firebase_auth: ^6.2.0
  google_sign_in: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: ReadexPro
      fonts:
        - asset: assets/fonts/ReadexPro-Regular.ttf
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Bold.ttf
    
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon_logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/icon_logo.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash_icon.png
  android_12:
    image: assets/images/splash_icon.png
    color: "#ffffff"
  fullscreen: true